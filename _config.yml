title: "Kamal"
description: "Deploy web apps anywhere"
url: https://kamal-deploy.org
image: /assets/images/opengraph.png
github: basecamp
repository: basecamp/kamal-site
markdown: kramdown
highlighter: rouge
permalink: pretty

# Multi-language support
languages:
  - en
  - zh

default_lang: en

plugins:
  - jekyll-redirect-from

exclude:
  - .jekyll-cache
  - Gemfile
  - Gemfile.lock
  - README.md
  - bin

sass:
  style: compressed

defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: default
  - scope:
      path: docs
      type: pages
    values:
      layout: docs
      search: true
      lang: en
  - scope:
      path: docs/zh
      type: pages
    values:
      layout: docs
      search: true
      lang: zh
  - scope:
      path: v1/docs
      type: pages
    values:
      layout: docs
      search: true
      version: v1
      lang: en

redirect_from:
  json: false
